<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>

  <!-- Ping Pong Paddle -->
  <ellipse cx="200" cy="250" rx="90" ry="110" fill="#1f2937" opacity="0.3"/>
  <ellipse cx="195" cy="245" rx="90" ry="110" fill="#ef4444"/>
  <rect x="165" y="330" width="60" height="120" rx="10" fill="#1f2937" opacity="0.3"/>
  <rect x="160" y="325" width="60" height="120" rx="10" fill="#78716c"/>

  <!-- Ping Pong Ball -->
  <circle cx="340" cy="180" r="65" fill="#1f2937" opacity="0.3"/>
  <circle cx="335" cy="175" r="65" fill="#ffffff"/>
  <ellipse cx="320" cy="160" rx="20" ry="15" fill="#f1f5f9" opacity="0.7"/>
</svg>
